# Minimal nginx top-level config. The per-server config lives in
# `conf.d/default.conf` (rendered from `default.conf.template` by
# the entrypoint). Keeping this file tiny means one less thing to
# forget when upgrading the nginx base image.

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Access log goes to stdout so Cloud Logging captures it natively.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /dev/stdout  main;

    sendfile        on;
    keepalive_timeout  65;

    # gzip covers the SPA bundle; everything dynamic comes from the
    # backend which handles its own compression.
    gzip              on;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length   1024;

    include /etc/nginx/conf.d/*.conf;
}
