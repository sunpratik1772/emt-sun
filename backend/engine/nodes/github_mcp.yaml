type_id: github_mcp
description: Call GitHub MCP bridge tools — list commits, implement fixes, open PRs linked to Jira issues.
ui:
  display_name: GitHub MCP
  icon: GitPullRequest
  color: "#24292F"
  palette: { section: { id: integrations, label: Integrations, color: "#14B8A6", order: 25 }, node_order: 12 }
input_ports: [{ name: rows, type: dataframe, optional: true }]
output_ports: [{ name: rows, type: dataframe }]
params:
  - name: serverUrl
    type: string
    required: false
    widget: text
    description: Optional bridge URL override (default http://127.0.0.1:8765 or MCP_SERVER_URL).
  - name: githubToken
    type: string
    required: false
    locked_from_env: true
    env_key: GITHUB_TOKEN
    widget: locked_env
    description: GitHub PAT (from backend/.env — locked).
  - name: githubRepo
    type: string
    required: false
    locked_from_env: true
    env_key: GITHUB_REPO
    widget: locked_env
    description: Target repository (from backend/.env — locked).
  - name: tool
    type: enum
    required: true
    default: github_list_commits
    widget: select
    description: GitHub MCP tool to invoke.
    enum:
      - github_list_commits
      - github_implement_fixes
      - github_fix_jira_and_update
  - name: params
    type: json
    required: false
    widget: json_editor
    description: Tool arguments (JSON). Upstream rows are passed as params.data automatically.
