type_id: db_query
description: Run a SELECT against an Oracle-backed dataset.
ui:
  display_name: DB Query
  icon: Database
  color: "#0ea5e9"
  palette: { section: { id: data } }
input_ports: []
output_ports: [{ name: rows, type: dataframe }]
params:
  - { name: query, type: string, description: "SELECT * FROM comms_messages LIMIT 20", required: true, widget: textarea }
  - { name: source, type: enum, description: "Source dataset", required: false,
      enum: [leads.csv, products.csv, orders.csv, hs_trades, hs_alerts, hs_orders, hs_exec, market_ticks, comms_messages] }
