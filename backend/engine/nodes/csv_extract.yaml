type_id: csv_extract
description: Load rows from an Oracle-backed dataset (alias for table extract).
ui:
  display_name: Data Extract
  icon: Table2
  color: "#0ea5e9"
  palette: { section: { id: data } }
input_ports: []
output_ports:
  - { name: rows, type: dataframe, store_at: datasets.<source> }
params:
  - { name: source, type: enum, description: "Dataset id", required: true,
      enum: [leads.csv, products.csv, orders.csv, hs_trades, hs_alerts, hs_orders, hs_exec, market_ticks, comms_messages],
      widget: select }
  - { name: limit, type: number, description: "Row limit (optional)", required: false }
