type_id: jira_mcp
description: Call Jira MCP bridge tools — create issues, list tickets, epics from Confluence.
ui:
  display_name: Jira MCP
  icon: Ticket
  color: "#0052CC"
  palette: { section: { id: integrations, label: Integrations, color: "#14B8A6", order: 25 }, node_order: 10 }
input_ports: [{ name: rows, type: dataframe, optional: true }]
output_ports: [{ name: rows, type: dataframe }]
params:
  - name: serverUrl
    type: string
    required: false
    widget: text
    description: Optional bridge URL override (default http://127.0.0.1:8765 or MCP_SERVER_URL).
  - name: jiraSiteUrl
    type: string
    required: false
    locked_from_env: true
    env_key: ATLASSIAN_SITE_URL
    widget: locked_env
    description: Jira site URL (from backend/.env — locked).
  - name: jiraEmail
    type: string
    required: false
    locked_from_env: true
    env_key: ATLASSIAN_EMAIL
    widget: locked_env
    description: Jira account email (from backend/.env — locked).
  - name: jiraApiToken
    type: string
    required: false
    locked_from_env: true
    env_key: ATLASSIAN_API_TOKEN
    widget: locked_env
    description: Jira API token (from backend/.env — locked).
  - name: jiraProjectKey
    type: string
    required: false
    locked_from_env: true
    env_key: JIRA_PROJECT_KEY
    widget: locked_env
    description: Jira project key (from backend/.env — locked).
  - name: tool
    type: enum
    required: true
    default: jira_create_issue
    widget: select
    description: Jira MCP tool to invoke.
    enum:
      - jira_create_issue
      - jira_list_issues
      - jira_create_epics_from_confluence
      - tasks_bulk_create
  - name: params
    type: json
    required: false
    widget: json_editor
    description: Tool arguments (JSON). Upstream rows are passed as params.data automatically.
