type_id: slack
description: Send a Slack message via Bot Token (chat.postMessage) or incoming webhook.
ui:
  display_name: Slack
  icon: MessageSquare
  color: "#4a154b"
  palette: { section: { id: integrations } }
  config_tags: [deprecated]
input_ports: [{ name: rows, type: dataframe, optional: true }]
output_ports: [{ name: result, type: object }]
params:
  - { name: channel, type: string, default: "#general" }
  - { name: message, type: string, widget: textarea }
  - { name: webhookUrl, type: string, required: false, placeholder: "https://hooks.slack.com/... (optional, fallback if no bot token)" }
