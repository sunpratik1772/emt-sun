# Cloud Run service manifest for the dbSherpa backend.
#
# This is a declarative, version-controlled deploy spec — run:
#
#   gcloud run services replace backend/deploy/service.yaml \
#       --region us-central1
#
# and Cloud Run reconciles the service to exactly this shape. Use
# this over imperative `gcloud run deploy` flags so the diff lives
# in git.
#
# Placeholders to fill in before first deploy:
#   PROJECT_ID   — your GCP project
#   REGION       — e.g. us-central1
#   IMAGE_TAG    — Artifact Registry URL of the pushed image
#                 (us-central1-docker.pkg.dev/PROJECT_ID/dbsherpa/backend:<sha>)
#
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: dbsherpa-backend
  labels:
    app: dbsherpa
    component: backend
  annotations:
    # Scale-to-zero for cost. Set min-instances=1 for always-warm demos.
    run.googleapis.com/ingress: all
    run.googleapis.com/description: "dbSherpa surveillance analytics engine."
spec:
  template:
    metadata:
      annotations:
        # Concurrency: each instance handles up to 20 HTTP requests.
        # Our engine is pandas-bound and the RunContext is per-request,
        # so we stay CPU-safe under modest fan-out.
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      # A single workflow run can build 4 DataFrames and an xlsx report.
      # 1 vCPU / 1 GiB is comfortable for the FX FRO golden path;
      # bump to 2 vCPU / 2 GiB if you see OOMs on larger datasets.
      containerConcurrency: 20
      timeoutSeconds: 300
      serviceAccountName: dbsherpa-backend@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - name: backend
          image: REGION-docker.pkg.dev/PROJECT_ID/dbsherpa/backend:IMAGE_TAG
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
          env:
            # Gemini API key pulled from Secret Manager. Create it with:
            #   gcloud secrets create gemini-api-key --data-file=-
            #   echo -n "$GEMINI_KEY" | gcloud secrets versions add gemini-api-key --data-file=-
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
            # Writable state redirected to the ephemeral /tmp volume.
            # Swap these for GCS FUSE mounts once persistence matters.
            - name: DBSHERPA_WORKFLOWS_DIR
              value: /tmp/dbsherpa/workflows
            - name: DBSHERPA_DRAFTS_DIR
              value: /tmp/dbsherpa/drafts
            - name: DBSHERPA_OUTPUT_DIR
              value: /tmp/dbsherpa/output
            - name: PYTHONUNBUFFERED
              value: "1"
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
  traffic:
    - percent: 100
      latestRevision: true
